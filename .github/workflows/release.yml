name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-*"
          CIBW_SKIP: "*-musllinux* *_i686 *-win32"
          CIBW_TEST_REQUIRES: "pytest numpy"
          CIBW_TEST_COMMAND: "pytest {project}/tests -k 'not benchmark' -q"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-r-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Install Rcpp
        run: Rscript -e 'install.packages("Rcpp")'
      - name: Build source package
        run: R CMD build --no-build-vignettes .
      - uses: actions/upload-artifact@v4
        with:
          name: r-tarball
          path: streamgraph_*.tar.gz

  publish-pypi:
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   #OIDC token for the PyPI trusted publisher
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "{wheels-*,sdist}"
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    needs: [build-wheels, build-sdist, build-r-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Attach wheels, sdist and R tarball to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.whl
            artifacts/*.tar.gz
