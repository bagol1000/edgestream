name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-python:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.11", "3.12"]
        include:
          # one recent Python per non-Linux OS exercises the clang/MSVC build paths
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install libomp (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pybind11 numpy pytest
      - name: Build and install
        run: pip install -e .
      - name: Run tests
        run: pytest tests/ -v --tb=short

  test-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and run DSU standalone test
        run: |
          g++ -std=c++17 -O2 -Isrc tests/test_dsu_standalone.cpp src/dsu.cpp -o /tmp/test_dsu
          /tmp/test_dsu

  test-r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install R dependencies
        run: Rscript -e 'install.packages(c("Rcpp", "testthat"))'
      - name: Install package
        run: R CMD INSTALL .
      - name: Run testthat suite
        run: Rscript -e "library(streamgraph); res <- testthat::test_dir('tests/testthat'); if (any(as.data.frame(res)\$failed > 0)) quit(status = 1)"

  check-r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
      - uses: r-lib/actions/check-r-package@v2
        with:
          error-on: '"warning"'
          args: 'c("--no-manual")'
